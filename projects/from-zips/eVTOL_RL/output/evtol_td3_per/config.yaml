        alpha: 2.0
        max: 30
        min: 10
      COMPLEX_NAV:
        alpha: 2.0
        max: 100
        min: 10
      GENERALIZATION:
        alpha: 2.5
        max: 200
        min: 20
      SIMPLE_NAV:
        alpha: 2.0
        max: 50
        min: 10
