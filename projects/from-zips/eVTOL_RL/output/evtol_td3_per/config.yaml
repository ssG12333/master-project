agent_params:
  gamma: 0.99
  lr_actor: 3e-5
  lr_critic: 3e-5
  noise_clip: 0.5
  policy_delay: 2
  policy_noise: 0.2
  tau: 0.005
batch_size: 256
buffer_size: 1000000
environment:
